<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediChain Secure - Blockchain EHR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      /* Custom scrollbar for better UI */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      
      .dark ::-webkit-scrollbar-thumb { background: #475569; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

      @keyframes gradientFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Animated Gradient Background */
      .app-background {
        /* Enhanced Gradient: Teal, Blue, and White mixture */
        background: linear-gradient(-45deg, #ccfbf1, #dbeafe, #f1f5f9, #f0fdfa);
        background-size: 400% 400%;
        animation: gradientFlow 15s ease infinite;
        min-height: 100vh;
      }
      
      .dark .app-background {
        /* Enhanced Dark Gradient: Deep Slate, Midnight, and Teal */
        background: linear-gradient(-45deg, #020617, #0f172a, #115e59, #1e1b4b);
        background-size: 400% 400%;
        animation: gradientFlow 15s ease infinite;
      }
    </style>
